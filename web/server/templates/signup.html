<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign up · Freefall</title>
<style>
  body {
    margin: 0;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    background: linear-gradient(135deg, #fbfaf7, #e0d4ff);
    min-height: 100vh;
    display: grid; place-items: center;
    color: #0a0a14;
  }
  .card {
    background: white; width: min(420px, 92vw); padding: 32px;
    border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.08);
  }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: #777; font-size: 14px; margin-bottom: 24px; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 6px; }
  input {
    width: 100%; box-sizing: border-box; padding: 10px 12px;
    border-radius: 10px; border: 1px solid #ddd; font: inherit;
  }
  input:focus { outline: 2px solid #4f46e5; border-color: transparent; }
  button {
    width: 100%; margin-top: 20px; padding: 12px;
    border-radius: 10px; background: #4f46e5; color: white;
    border: none; font: inherit; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .swap { text-align: center; font-size: 13px; color: #666; margin-top: 16px; }
  .swap a { color: #4f46e5; }
  .err {
    background: #fee2e2; color: #991b1b;
    padding: 10px 12px; border-radius: 10px;
    margin-top: 16px; font-size: 13px; display: none;
  }
  .err.show { display: block; }
  .ok {
    background: #dcfce7; color: #14532d;
    padding: 10px 12px; border-radius: 10px;
    margin-top: 16px; font-size: 13px; display: none;
  }
  .ok.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <h1>🪂 Create your club</h1>
  <p class="sub">First operator becomes the owner. You can invite teammates later.</p>

  <form id="f" novalidate>
    <label>Club name</label>
    <input name="tenant_name" placeholder="Skydive Tallinn" required>

    <label>URL slug <span style="color:#999;font-weight:400">(letters, digits, dashes; 3–40 chars)</span></label>
    <input name="tenant_slug" placeholder="skydive-tallinn" required pattern="[a-z0-9](?:[a-z0-9-]{1,38}[a-z0-9])">

    <label>Your email</label>
    <input name="email" type="email" required>

    <label>Password <span style="color:#999;font-weight:400">(10+ chars)</span></label>
    <input name="password" type="password" required minlength="10">

    <button type="submit">Create club</button>
    <div id="err" class="err"></div>
    <div id="ok" class="ok"></div>
  </form>

  <div class="swap">Already have an account? <a href="/login">Sign in</a></div>
</div>

<script>
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  const errEl = document.getElementById('err');
  const okEl = document.getElementById('ok');
  errEl.classList.remove('show'); okEl.classList.remove('show');
  const btn = e.target.querySelector('button');
  btn.disabled = true;
  try {
    const res = await fetch('/auth/signup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    const body = await res.json();
    if (!res.ok) {
      errEl.textContent = body.message || 'Signup failed';
      errEl.classList.add('show');
      btn.disabled = false;
      return;
    }
    okEl.textContent = 'Welcome, ' + body.email + '! Loading dashboard…';
    okEl.classList.add('show');
    setTimeout(() => location.href = '/', 600);
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add('show');
    btn.disabled = false;
  }
});
</script>
</body>
</html>
