<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Settings · Skydive Memory</title>
<link rel="stylesheet" href="/static/skydive-memory.css">
</head>
<body>

<div class="sm-page">
  {{template "admin-rail" .}}

  <main style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <header style="height:64px;border-bottom:1px solid var(--sm-border);display:flex;align-items:center;padding:0 28px;gap:16px">
      <div style="flex:1">
        <h1 style="font-size:20px;font-weight:500">Settings</h1>
        <div style="font-size:12px;color:var(--sm-text-muted);margin-top:2px">Account &amp; tenant configuration</div>
      </div>
    </header>

    <div style="padding:28px;overflow:auto;flex:1;max-width:760px;width:100%;margin:0 auto">
      <div class="sm-card" style="padding:24px;margin-bottom:16px">
        <h2 style="font-size:16px;margin-bottom:18px">Account</h2>
        <div style="display:grid;grid-template-columns:200px 1fr;gap:14px 18px;font-size:13px">
          <div style="color:var(--sm-text-muted)">Email</div><div>{{.OperatorEmail}}</div>
          <div style="color:var(--sm-text-muted)">Role</div><div>{{.OperatorRole}}</div>
          <div style="color:var(--sm-text-muted)">Tenant</div><div>{{.TenantName}} <span class="mono" style="color:var(--sm-text-dim);margin-left:6px">{{.TenantSlug}}</span></div>
          <div style="color:var(--sm-text-muted)">This month</div><div><a href="/admin/billing" style="color:var(--sm-brand-hi);text-decoration:none;font-family:var(--sm-mono)">{{.PlanLabel}} →</a></div>
        </div>
      </div>

      <div class="sm-card" style="padding:24px">
        <h2 style="font-size:16px;margin-bottom:6px">Diagnostics</h2>
        <p style="color:var(--sm-text-muted);font-size:13px;margin-bottom:18px">For debugging cloud connectivity from a studio install.</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <a href="/auth/me" class="sm-btn is-sm" target="_blank">/auth/me JSON</a>
          <a href="/healthz" class="sm-btn is-sm" target="_blank">/healthz</a>
          <form method="POST" action="/auth/logout" style="display:inline">
            <button type="submit" class="sm-btn is-sm is-danger">Sign out</button>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
