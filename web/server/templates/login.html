<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in · Freefall</title>
<style>
  body {
    margin: 0;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    background: linear-gradient(135deg, #fbfaf7, #c5deff);
    min-height: 100vh;
    display: grid; place-items: center;
    color: #0a0a14;
  }
  .card {
    background: white; width: min(420px, 92vw); padding: 32px;
    border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.08);
  }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: #777; font-size: 14px; margin-bottom: 24px; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 6px; }
  input {
    width: 100%; box-sizing: border-box; padding: 10px 12px;
    border-radius: 10px; border: 1px solid #ddd; font: inherit;
  }
  input:focus { outline: 2px solid #4f46e5; border-color: transparent; }
  button {
    width: 100%; margin-top: 20px; padding: 12px;
    border-radius: 10px; background: #4f46e5; color: white;
    border: none; font: inherit; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .swap { text-align: center; font-size: 13px; color: #666; margin-top: 16px; }
  .swap a { color: #4f46e5; }
  .err {
    background: #fee2e2; color: #991b1b;
    padding: 10px 12px; border-radius: 10px;
    margin-top: 16px; font-size: 13px; display: none;
  }
  .err.show { display: block; }
  .hint { color: #999; font-weight: 400; font-size: 12px; }
</style>
</head>
<body>
<div class="card">
  <h1>🪂 Sign in</h1>
  <p class="sub">Welcome back.</p>

  <form id="f" novalidate>
    <label>Email</label>
    <input name="email" type="email" required autofocus>

    <label>Password</label>
    <input name="password" type="password" required>

    <label style="margin-top:18px">
      Tenant slug <span class="hint">(only if your email is in multiple clubs)</span>
    </label>
    <input name="tenant_slug" placeholder="optional">

    <button type="submit">Sign in</button>
    <div id="err" class="err"></div>
  </form>

  <div class="swap">No account yet? <a href="/signup">Create a club</a></div>
</div>

<script>
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  if (!data.tenant_slug) delete data.tenant_slug;
  const errEl = document.getElementById('err');
  errEl.classList.remove('show');
  const btn = e.target.querySelector('button');
  btn.disabled = true;
  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    const body = await res.json();
    if (!res.ok) {
      errEl.textContent = body.message || 'Login failed';
      errEl.classList.add('show');
      btn.disabled = false;
      return;
    }
    location.href = '/';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add('show');
    btn.disabled = false;
  }
});
</script>
</body>
</html>
