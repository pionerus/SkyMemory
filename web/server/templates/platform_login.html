<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Platform admin · Skydive Memory</title>
<link rel="stylesheet" href="/static/skydive-memory.css">
</head>
<body>
<div class="sm-auth-shell">
  <div class="sm-auth-content">
    <div style="display:flex;justify-content:center;margin-bottom:32px">
      <span class="sm-tile" aria-label="Skydive Memory"><span class="sm-mark"></span></span>
    </div>
    <div class="sm-card" style="padding:32px">
      <div style="font-size:11px;color:var(--sm-text-muted);text-transform:uppercase;letter-spacing:.08em;text-align:center;margin-bottom:8px;font-family:var(--sm-mono)">Platform admin</div>
      <h2 style="font-size:24px;text-align:center;margin-bottom:6px">Cross-tenant control</h2>
      <p style="color:var(--sm-text-muted);text-align:center;font-size:13px;margin-bottom:24px">For the Skydive Memory team only.</p>

      <form id="f" novalidate>
        <div style="margin-bottom:14px">
          <label class="sm-label">Email</label>
          <input class="sm-input" name="email" type="email" required autofocus placeholder="ops@skydivememory.app">
        </div>
        <div style="margin-bottom:8px">
          <label class="sm-label">Password</label>
          <div style="position:relative">
            <input id="pw" class="sm-input" name="password" type="password" required style="padding-right:42px">
            <button type="button" id="pw-toggle" aria-label="Toggle password visibility"
                    style="position:absolute;right:6px;top:50%;transform:translateY(-50%);height:32px;width:32px;background:transparent;border:none;color:var(--sm-text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center">
              <svg id="pw-eye-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="pw-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="sm-btn is-hero is-block is-lg" style="margin-top:20px">Sign in</button>
        <div id="err" class="sm-pill is-danger" style="display:none;width:100%;justify-content:center;margin-top:16px;height:auto;padding:10px 14px;white-space:normal"></div>
      </form>
    </div>
    <p style="text-align:center;margin-top:22px;font-size:12px;color:var(--sm-text-dim)">
      Bootstrapped via <span class="mono">server.exe platform-admin add &lt;email&gt; &lt;name&gt;</span>
    </p>
  </div>
  <div class="sm-auth-footer">
    <span>Skydive Memory · Platform</span>
    <span>Cross-tenant operations</span>
  </div>
</div>

<script>
const pwInput = document.getElementById('pw');
const pwToggle = document.getElementById('pw-toggle');
const eyeOn = document.getElementById('pw-eye-on');
const eyeOff = document.getElementById('pw-eye-off');
pwToggle.addEventListener('click', () => {
  const reveal = pwInput.type === 'password';
  pwInput.type = reveal ? 'text' : 'password';
  eyeOn.style.display  = reveal ? 'none' : '';
  eyeOff.style.display = reveal ? '' : 'none';
});

document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  const errEl = document.getElementById('err');
  errEl.style.display = 'none';
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true;
  try {
    const res = await fetch('/platform/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    const body = await res.json();
    if (!res.ok) {
      errEl.textContent = body.message || 'Login failed';
      errEl.style.display = 'flex';
      btn.disabled = false;
      return;
    }
    location.href = '/platform/';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'flex';
    btn.disabled = false;
  }
});
</script>

<button type="button" data-theme-toggle aria-label="Toggle theme"
        title="Toggle theme"
        style="position:fixed;top:18px;right:18px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.10);color:var(--sm-text-muted);width:34px;height:34px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50">
  <span data-theme-icon></span>
</button>
<script src="/static/theme-toggle.js" defer></script>
</body>
</html>
