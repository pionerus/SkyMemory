<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>New project · Skydive Memory Studio</title>
<link rel="stylesheet" href="/static/skydive-memory.css">
<style>
  .topbar {
    display:flex; align-items:center; gap:14px;
    padding: 18px 32px;
    border-bottom: 1px solid var(--sm-border);
    background: var(--sm-surface);
  }
  .topbar h1 { font-size: 16px; }
  .topbar .meta { color: var(--sm-text-muted); font-size: 12px; }
  .topbar .right { margin-left: auto; }
  .check-card {
    display:flex; align-items:flex-start; gap:12px;
    padding: 14px 16px;
    background: var(--sm-surface-2);
    border: 1px solid var(--sm-border);
    border-radius: 12px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 80ms;
  }
  .check-card:hover { border-color: var(--sm-border-strong); }
  .check-card.checked { border-color: var(--sm-brand); background: var(--sm-brand-soft); }
  .check-card input { margin-top: 4px; accent-color: var(--sm-brand); }
  .check-card .label { font-weight: 600; font-size: 14px; }
  .check-card .desc { color: var(--sm-text-muted); font-size: 12px; margin-top: 2px; }
  .check-card.nested { margin-left: 24px; }
</style>
</head>
<body>

<div class="topbar">
  <span class="sm-tile" style="width:36px;height:36px;border-radius:10px;box-shadow:none">
    <span class="sm-mark" style="width:24px"></span>
  </span>
  <div>
    <h1>New project</h1>
    <div class="meta">{{.License.TenantName}} · {{.License.OperatorEmail}}</div>
  </div>
  <div class="right"><a href="/" class="sm-btn is-ghost is-sm">← Cancel</a></div>
</div>

<main style="max-width:760px;margin:32px auto;padding:0 24px">
  <div class="sm-card" style="padding:28px">
    <h2 style="font-size:24px;margin-bottom:6px">Tell us about the jumper</h2>
    <p style="color:var(--sm-text-muted);font-size:13px;margin-bottom:24px">
      We'll register the project in the cloud and return an access code the client uses to watch their video.
    </p>

    <form id="f" novalidate>
      <div style="margin-bottom:14px">
        <label class="sm-label">Client name *</label>
        <input class="sm-input" name="client_name" type="text" required autofocus maxlength="200" placeholder="Anna Volkova">
      </div>

      <div style="margin-bottom:14px">
        <label class="sm-label">Client email <span style="color:var(--sm-text-dim);font-weight:400">(optional, used to send the watch link)</span></label>
        <input class="sm-input" name="client_email" type="email" placeholder="anna@example.com">
      </div>

      <div style="margin-bottom:14px">
        <label class="sm-label">Phone <span style="color:var(--sm-text-dim);font-weight:400">(optional)</span></label>
        <input class="sm-input" name="client_phone" type="tel" placeholder="+372 555 1234">
      </div>

      <div style="margin-top:24px;margin-bottom:8px">
        <span class="sm-label">Outputs</span>
      </div>

      <label class="check-card checked">
        <input type="checkbox" name="output_1080p" checked>
        <div>
          <div class="label">Client video · 1080p horizontal</div>
          <div class="desc">The main MP4 your client gets in their email link.</div>
        </div>
      </label>

      <label class="check-card">
        <input type="checkbox" name="output_4k">
        <div>
          <div class="label">Client video · 4K horizontal</div>
          <div class="desc">For clients who want maximum quality. Source clips must be ≥ 4K.</div>
        </div>
      </label>

      <label class="check-card">
        <input type="checkbox" name="output_vertical">
        <div>
          <div class="label">Instagram vertical · 1080×1920</div>
          <div class="desc">Center-cropped reel for social.</div>
        </div>
      </label>

      <label class="check-card">
        <input type="checkbox" name="output_photos">
        <div>
          <div class="label">Photos</div>
          <div class="desc">15 auto-screenshots from freefall, unless you upload your own DSLR photos below.</div>
        </div>
      </label>

      <label class="check-card nested">
        <input type="checkbox" name="has_operator_uploaded_photos">
        <div>
          <div class="label">I'll upload my own photos (DSLR)</div>
          <div class="desc">Skips auto-screenshots. Drop JPGs in the next step.</div>
        </div>
      </label>

      <div style="display:flex;gap:12px;align-items:center;margin-top:24px">
        <button type="submit" id="submitBtn" class="sm-btn is-hero is-lg">Create project & get access code</button>
        <a href="/" class="sm-btn">Cancel</a>
      </div>

      <div id="err" class="sm-pill is-danger" style="display:none;width:100%;justify-content:center;margin-top:16px;height:auto;padding:10px 14px;white-space:normal"></div>
    </form>
  </div>
</main>

<script>
// Sync checked-state visual on the cards
document.querySelectorAll('.check-card input[type=checkbox]').forEach(cb => {
  const card = cb.closest('.check-card');
  const sync = () => card.classList.toggle('checked', cb.checked);
  cb.addEventListener('change', sync); sync();
});

document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const payload = {
    client_name:                  (fd.get('client_name') || '').trim(),
    client_email:                 (fd.get('client_email') || '').trim(),
    client_phone:                 (fd.get('client_phone') || '').trim(),
    output_1080p:                 fd.get('output_1080p')   === 'on',
    output_4k:                    fd.get('output_4k')      === 'on',
    output_vertical:              fd.get('output_vertical')=== 'on',
    output_photos:                fd.get('output_photos')  === 'on',
    has_operator_uploaded_photos: fd.get('has_operator_uploaded_photos') === 'on'
  };
  const errEl = document.getElementById('err');
  errEl.style.display = 'none';
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  try {
    const res = await fetch('/projects', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      const html = await res.text();
      document.open(); document.write(html); document.close();
      return;
    }
    let msg = 'HTTP ' + res.status;
    try { const body = await res.json(); if (body.message) msg = body.message; } catch {}
    errEl.textContent = msg;
    errEl.style.display = 'flex';
    btn.disabled = false;
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'flex';
    btn.disabled = false;
  }
});
</script>
<button type="button" data-theme-toggle title="Toggle theme" aria-label="Toggle theme"
        style="position:fixed;top:18px;right:18px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.10);color:var(--sm-text-muted);width:34px;height:34px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50">
  <span data-theme-icon></span>
</button>
<script src="/static/theme-toggle.js" defer></script>
</body>
</html>
